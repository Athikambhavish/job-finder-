spring.application.name=jobfinder-backend

# ── DataSource ────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/jobfinder?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:jobuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:jobpassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Server ────────────────────────────────────────────────────
server.port=8080

# ── Logging ───────────────────────────────────────────────────
logging.level.com.jobfinder=DEBUG
logging.level.org.springframework.web=INFO

# ── JWT ───────────────────────────────────────────────────────
jwt.secret=jobfinder-super-secret-key-2024-must-be-at-least-32-chars
jwt.expiration=86400000

# ── File Upload ───────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads
